# 法務省ウェブを週1回巡回し、新年度の司法試験ページを検出したら
# years.js を自動更新してデプロイするワークフロー。
# （試験問題は例年8月頃、出題の趣旨・採点実感は9〜11月頃に掲載される）
name: 新年度の自動取り込み

on:
  schedule:
    # 毎週月曜 09:00 JST (00:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-years:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 法務省ページを巡回して years.js / news.js を更新
        run: node scripts/update-years.mjs

      - name: 変更があればコミットしてプッシュ
        run: |
          if git diff --quiet years.js news.js yobi-years.js; then
            echo "変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add years.js news.js yobi-years.js
          git commit -m "chore: 法務省ウェブの巡回により年度対応表・更新情報を自動更新"
          git push

      # 全年度×全種類で PDF リンク探索が機能するか検査する。
      # 法務省サイトの構造変更や中継 Worker の障害をここで検知する
      - name: リンク探索の健全性チェック
        run: node scripts/check-links.mjs

      # リポジトリに60日間コミットがないと GitHub が定期実行を自動停止する
      # ため、実行のたびに再有効化してタイマーをリセットする
      - name: 定期実行の自動停止を防止
        if: always()
        run: gh workflow enable update-years.yml --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
